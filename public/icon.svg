<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="felt" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a7a48"/>
      <stop offset="60%" stop-color="#0e5530"/>
      <stop offset="100%" stop-color="#084221"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <radialGradient id="rim" cx="35%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#a87447"/>
      <stop offset="60%" stop-color="#5a3a1a"/>
      <stop offset="100%" stop-color="#3d2810"/>
    </radialGradient>
  </defs>

  <!-- Outer rounded square (app icon shape) -->
  <rect width="512" height="512" rx="96" fill="#0a1612"/>

  <!-- Wooden rim circle -->
  <circle cx="256" cy="256" r="220" fill="url(#rim)"/>

  <!-- Inner felt circle -->
  <circle cx="256" cy="256" r="180" fill="url(#felt)"/>

  <!-- Gold ring accent -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.5"/>

  <!-- Spade symbol (centered) -->
  <g transform="translate(256 270)">
    <path d="M 0 -110 C -55 -50 -110 -10 -110 35 C -110 75 -75 100 -45 100 C -25 100 -10 90 0 75 C 10 90 25 100 45 100 C 75 100 110 75 110 35 C 110 -10 55 -50 0 -110 Z"
          fill="url(#gold)" stroke="#7a5a14" stroke-width="2"/>
    <!-- Stem -->
    <path d="M -25 100 L 25 100 L 18 130 L -18 130 Z" fill="url(#gold)" stroke="#7a5a14" stroke-width="2"/>
  </g>
</svg>
